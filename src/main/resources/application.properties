spring.application.name=Blogging-Platform-API

# Your database connection
spring.datasource.url=jdbc:mysql://localhost:3306/bloggingPlatform
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
# 'update' means: auto-create tables from your Java classes (great for development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Your app runs on port 8080
server.port=8080

# A secret key for making JWT tokens (use a long random string)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000